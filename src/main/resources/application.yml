server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jp_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HikariPool
      # 最大连接数
      maximum-pool-size: 20
      # 最小空闲连接
      minimum-idle: 5
      # 空闲连接最大存活时间（10分钟）
      idle-timeout: 600000
      # 最大生命周期（30分钟）
      max-lifetime: 1800000
      # 获取连接超时时间（30秒）
      connection-timeout: 30000
      # 连接测试语句（MySQL）
      connection-test-query: SELECT 1
  data:
    redis:
      host: localhost
      port: 6379
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true